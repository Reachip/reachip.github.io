language: python
python:
  - "3.7"

install:
  - pip install -r requirements

script: 
  - export BLOG_DEV=NO
  - export GOOGLE_AN= 
  - make html

deploy:
    provider: pages
    verbose: true
    local-dir: ./output
    github_token: $TOKEN
    keep_history: true
    target_branch: master
    on:
        branch: develop
